<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIXEL ASSAULT</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }
  canvas { display: block; cursor: crosshair; image-rendering: pixelated; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ── Canvas ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;
canvas.width = W; canvas.height = H;

// ── Globals ───────────────────────────────────────────────────────────────────
const SCREEN = { MENU:'menu', PLAY:'play', LEVEL_DONE:'level_done', GAME_OVER:'game_over', PAUSED:'paused' };
let screen = SCREEN.MENU;
let score = 0, hiScore = +localStorage.getItem('pxAHi') || 0;
let level = 1, levelDoneTimer = 0;
let animT = 0, lastTime = 0;

// ── Input ─────────────────────────────────────────────────────────────────────
const keys = {};
const mouse = { x: W/2, y: H/2, down: false };
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  if (e.key === 'Enter') {
    if (screen === SCREEN.MENU || screen === SCREEN.GAME_OVER) startGame();
    else if (screen === SCREEN.PAUSED) screen = SCREEN.PLAY;
  }
  if (e.key === 'p' || e.key === 'P') {
    if (screen === SCREEN.PLAY) screen = SCREEN.PAUSED;
    else if (screen === SCREEN.PAUSED) screen = SCREEN.PLAY;
  }
});
window.addEventListener('keyup', e => { keys[e.key] = false; });
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - r.left) * (W / r.width);
  mouse.y = (e.clientY - r.top) * (H / r.height);
});
canvas.addEventListener('mousedown', () => {
  mouse.down = true;
  if (screen === SCREEN.MENU || screen === SCREEN.GAME_OVER) startGame();
});
canvas.addEventListener('mouseup', () => { mouse.down = false; });

// ── Entities ──────────────────────────────────────────────────────────────────
let player, bullets, enemies, particles, flashes;
let spawnQueue = [], spawnTimer = 0, spawnInterval = 1.2;

function startGame() {
  score = 0; level = 1;
  bullets = []; enemies = []; particles = []; flashes = [];
  player = makePlayer();
  spawnWave();
  screen = SCREEN.PLAY;
}

function makePlayer() {
  return { x: W/2, y: H/2, angle: 0, speed: 210, hp: 3, maxHp: 3,
           cooldown: 0, fireRate: 0.22, radius: 14, walkT: 0, invincible: 0, dead: false };
}

// ── Particles ─────────────────────────────────────────────────────────────────
function burst(x, y, n, color, spd, life) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, s = spd * (0.4 + Math.random() * 0.6);
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life, maxLife: life,
                     color, size: 2 + Math.random() * 3 });
  }
}
function explode(x, y, color) { burst(x, y, 14, color, 130, 0.55); burst(x, y, 5, '#fff', 200, 0.2); }

// ── Wave / Enemy Spawning ─────────────────────────────────────────────────────
function waveConfig(lvl) {
  return {
    basic: Math.min(6 + lvl * 3, 28),
    fast:  lvl >= 3 ? Math.min((lvl-2)*3, 14) : 0,
    tank:  lvl >= 5 ? Math.min((lvl-4)*2,  8) : 0,
  };
}

function spawnWave() {
  const cfg = waveConfig(level);
  spawnQueue = [
    ...Array(cfg.basic).fill('basic'),
    ...Array(cfg.fast).fill('fast'),
    ...Array(cfg.tank).fill('tank'),
  ];
  for (let i = spawnQueue.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [spawnQueue[i], spawnQueue[j]] = [spawnQueue[j], spawnQueue[i]];
  }
  spawnTimer = 0;
  spawnInterval = Math.max(0.32, 1.4 - level * 0.09);
}

function edgePos() {
  const edge = Math.floor(Math.random()*4);
  if (edge === 0) return { x: Math.random()*W, y: -32 };
  if (edge === 1) return { x: W+32, y: Math.random()*H };
  if (edge === 2) return { x: Math.random()*W, y: H+32 };
  return { x: -32, y: Math.random()*H };
}

function spawnEnemy(type) {
  const pos = edgePos();
  const base = { ...pos, type, angle: 0, dead: false };
  if (type === 'basic') return enemies.push({ ...base, hp:1, maxHp:1, speed:78+level*5, radius:16, pts:10 });
  if (type === 'fast')  return enemies.push({ ...base, hp:1, maxHp:1, speed:145+level*6, radius:11, pts:20, zigT:Math.random()*6 });
  if (type === 'tank')  return enemies.push({ ...base, hp:3, maxHp:3, speed:48+level*3, radius:22, pts:50 });
}

// ── Update ────────────────────────────────────────────────────────────────────
function update(dt) {
  // Player move
  const dx = ((keys['ArrowRight']||keys['d']||keys['D'])?1:0) - ((keys['ArrowLeft']||keys['a']||keys['A'])?1:0);
  const dy = ((keys['ArrowDown'] ||keys['s']||keys['S'])?1:0) - ((keys['ArrowUp'] ||keys['w']||keys['W'])?1:0);
  if (dx||dy) {
    const len = Math.sqrt(dx*dx+dy*dy);
    player.x += dx/len * player.speed * dt;
    player.y += dy/len * player.speed * dt;
    player.walkT += dt * 9;
  }
  player.x = Math.max(player.radius, Math.min(W-player.radius, player.x));
  player.y = Math.max(player.radius, Math.min(H-player.radius, player.y));
  player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);

  // Shoot
  player.cooldown -= dt;
  if ((mouse.down || keys[' ']) && player.cooldown <= 0) {
    player.cooldown = player.fireRate;
    const gl = 20;
    const bx = player.x + Math.cos(player.angle)*gl, by = player.y + Math.sin(player.angle)*gl;
    bullets.push({ x:bx, y:by, vx:Math.cos(player.angle)*540, vy:Math.sin(player.angle)*540 });
    flashes.push({ x:bx, y:by, t:0.09 });
    burst(bx, by, 3, '#ffe066', 55, 0.15);
  }
  if (player.invincible > 0) player.invincible -= dt;

  // Bullets move
  for (let i = bullets.length-1; i >= 0; i--) {
    bullets[i].x += bullets[i].vx * dt;
    bullets[i].y += bullets[i].vy * dt;
    if (bullets[i].x < -20 || bullets[i].x > W+20 || bullets[i].y < -20 || bullets[i].y > H+20)
      bullets.splice(i, 1);
  }

  // Spawn queue
  if (spawnQueue.length > 0) {
    spawnTimer -= dt;
    if (spawnTimer <= 0) { spawnEnemy(spawnQueue.pop()); spawnTimer = spawnInterval; }
  }

  // Enemies move + collide player
  for (const e of enemies) {
    if (e.dead) continue;
    const ex = player.x - e.x, ey = player.y - e.y;
    const dist = Math.sqrt(ex*ex+ey*ey);
    const nx = ex/dist, ny = ey/dist;
    e.angle = Math.atan2(ny, nx);

    if (e.type === 'fast') {
      e.zigT += dt * 3;
      e.x += (nx*e.speed + (-ny)*Math.sin(e.zigT)*55) * dt;
      e.y += (ny*e.speed + nx*Math.sin(e.zigT)*55) * dt;
    } else {
      e.x += nx*e.speed*dt;
      e.y += ny*e.speed*dt;
    }

    if (dist < e.radius + player.radius && player.invincible <= 0) {
      player.hp--;
      player.invincible = 1.1;
      burst(player.x, player.y, 8, '#ff4444', 90, 0.5);
      if (player.hp <= 0) { explode(player.x, player.y, '#ff4444'); player.dead = true; }
    }
  }

  // Bullet vs enemy
  for (let bi = bullets.length-1; bi >= 0; bi--) {
    const b = bullets[bi];
    for (const e of enemies) {
      if (e.dead) continue;
      const dx = b.x-e.x, dy = b.y-e.y;
      if (dx*dx+dy*dy < e.radius*e.radius) {
        e.hp--;
        burst(b.x, b.y, 5, '#ff8800', 80, 0.28);
        bullets.splice(bi, 1);
        if (e.hp <= 0) {
          e.dead = true;
          score += e.pts * level;
          if (score > hiScore) { hiScore = score; localStorage.setItem('pxAHi', hiScore); }
          const col = {basic:'#e63',fast:'#a6f',tank:'#88a'}[e.type];
          explode(e.x, e.y, col);
        }
        break;
      }
    }
  }

  enemies = enemies.filter(e => !e.dead);

  // Particles
  for (const p of particles) { p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.90; p.vy*=0.90; p.life-=dt; }
  particles = particles.filter(p => p.life > 0);
  for (const f of flashes) f.t -= dt;
  flashes = flashes.filter(f => f.t > 0);

  // Transitions
  if (player.dead) { screen = SCREEN.GAME_OVER; return; }
  if (spawnQueue.length === 0 && enemies.length === 0) {
    screen = SCREEN.LEVEL_DONE;
    levelDoneTimer = 2.4;
  }
}

function tickLevelDone(dt) {
  levelDoneTimer -= dt;
  if (levelDoneTimer <= 0) {
    level++;
    bullets = []; flashes = [];
    spawnWave();
    screen = SCREEN.PLAY;
  }
}

// ── Drawing ───────────────────────────────────────────────────────────────────
function drawBg() {
  ctx.fillStyle = '#0d0d18';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(255,255,255,0.028)';
  ctx.lineWidth = 1;
  for (let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for (let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

function drawPlayer() {
  if (player.dead) return;
  if (player.invincible > 0 && Math.floor(animT*10)%2===0) return;
  const p = player;
  ctx.save();
  ctx.translate(p.x, p.y);

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.28)';
  ctx.beginPath(); ctx.ellipse(2,5,14,7,0,0,Math.PI*2); ctx.fill();

  // Legs
  const leg = Math.sin(p.walkT)*5;
  ctx.fillStyle='#2a4a2a';
  ctx.fillRect(-7,8,5,8+leg);
  ctx.fillRect(2,8,5,8-leg);

  // Body
  ctx.fillStyle='#3a7a3a';
  ctx.beginPath(); ctx.roundRect(-10,-8,20,20,4); ctx.fill();
  ctx.strokeStyle='#2a5a2a'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.fillStyle='#2d6030'; ctx.fillRect(-4,-6,8,14); // vest

  // Rotate for gun + head
  ctx.rotate(p.angle);
  // Gun
  ctx.fillStyle='#555'; ctx.fillRect(8,-3,18,6);
  ctx.fillStyle='#444'; ctx.fillRect(8,-2,14,4);
  ctx.fillStyle='#333'; ctx.fillRect(22,-1.5,6,3);
  ctx.rotate(-p.angle);

  // Head
  ctx.fillStyle='#e8c99a';
  ctx.beginPath(); ctx.arc(0,-4,8,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#c8a87a'; ctx.lineWidth=1; ctx.stroke();
  // Helmet
  ctx.fillStyle='#3a7a3a';
  ctx.beginPath(); ctx.ellipse(0,-7,8,5,0,Math.PI,0); ctx.fill();
  // Eyes follow aim
  ctx.rotate(p.angle);
  ctx.fillStyle='#000'; ctx.fillRect(3,-5,3,2);
  ctx.fillStyle='#ffe066'; ctx.fillRect(3.5,-4.5,2,1);

  ctx.restore();
}

function drawEnemyBasic(e) {
  ctx.save(); ctx.translate(e.x,e.y); ctx.rotate(e.angle+Math.PI/4);
  ctx.fillStyle='rgba(0,0,0,0.28)';
  ctx.beginPath(); ctx.ellipse(2,3,14,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = e.hp/e.maxHp > 0.5 ? '#c0392b' : '#e74c3c';
  ctx.fillRect(-12,-12,24,24);
  ctx.strokeStyle='#922b21'; ctx.lineWidth=2; ctx.strokeRect(-12,-12,24,24);
  ctx.rotate(-(e.angle+Math.PI/4));
  ctx.fillStyle='#ff0'; ctx.fillRect(-5,-5,4,4); ctx.fillRect(1,-5,4,4);
  ctx.fillStyle='#000'; ctx.fillRect(-4,-4,2,2); ctx.fillRect(2,-4,2,2);
  ctx.restore();
}

function drawEnemyFast(e) {
  ctx.save(); ctx.translate(e.x,e.y); ctx.rotate(animT*3);
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(1,2,10,6,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#9b59b6';
  ctx.beginPath(); ctx.moveTo(0,-14); ctx.lineTo(14,0); ctx.lineTo(0,14); ctx.lineTo(-14,0); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#6c3483'; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle='#d2b4de';
  ctx.beginPath(); ctx.moveTo(0,-6); ctx.lineTo(6,0); ctx.lineTo(0,6); ctx.lineTo(-6,0); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawEnemyTank(e) {
  ctx.save(); ctx.translate(e.x,e.y);
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(3,5,22,12,0,0,Math.PI*2); ctx.fill();
  const ratio = e.hp/e.maxHp;
  ctx.fillStyle = ratio>0.66 ? '#7f8c8d' : ratio>0.33 ? '#95a5a6' : '#bdc3c7';
  ctx.beginPath();
  for(let i=0;i<6;i++){const a=i/6*Math.PI*2-Math.PI/2; i===0?ctx.moveTo(Math.cos(a)*20,Math.sin(a)*20):ctx.lineTo(Math.cos(a)*20,Math.sin(a)*20);}
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#5d6d7e'; ctx.lineWidth=3; ctx.stroke();
  for(let i=0;i<e.maxHp;i++){ctx.fillStyle=i<e.hp?'#e74c3c':'#333';ctx.fillRect(-12+i*9,-4,7,8);}
  ctx.rotate(e.angle);
  ctx.fillStyle='#e74c3c'; ctx.fillRect(8,-6,5,5); ctx.fillRect(8,1,5,5);
  ctx.restore();
}

function drawEnemy(e) {
  if (e.type==='basic') drawEnemyBasic(e);
  else if (e.type==='fast') drawEnemyFast(e);
  else if (e.type==='tank') drawEnemyTank(e);
}

function drawBullets() {
  ctx.shadowBlur = 10; ctx.shadowColor = '#ffe066';
  for (const b of bullets) {
    ctx.save(); ctx.translate(b.x,b.y);
    const a = Math.atan2(b.vy,b.vx); ctx.rotate(a);
    ctx.fillStyle='#ffe066'; ctx.fillRect(-7,-2,14,4);
    ctx.fillStyle='#fff'; ctx.fillRect(-5,-1,10,2);
    ctx.restore();
  }
  ctx.shadowBlur = 0;
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life/p.maxLife;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-p.size/2, p.y-p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function drawFlashes() {
  for (const f of flashes) {
    ctx.globalAlpha = f.t/0.09 * 0.9;
    ctx.shadowColor='#ffe066'; ctx.shadowBlur=20;
    ctx.fillStyle='#ffe066';
    ctx.beginPath(); ctx.arc(f.x,f.y,10,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0;
}

function drawHeart(x,y,filled) {
  ctx.save(); ctx.translate(x,y); ctx.scale(0.85,0.85);
  ctx.fillStyle = filled ? '#e74c3c' : '#444';
  ctx.beginPath();
  ctx.moveTo(0,4); ctx.bezierCurveTo(-10,-4,-16,0,-8,8);
  ctx.lineTo(0,16); ctx.lineTo(8,8); ctx.bezierCurveTo(16,0,10,-4,0,4);
  ctx.fill();
  if(filled){ctx.fillStyle='#ff8888'; ctx.fillRect(-4,-1,3,3);}
  ctx.restore();
}

function drawHUD() {
  for(let i=0;i<player.maxHp;i++) drawHeart(16+i*28, 14, i<player.hp);

  ctx.fillStyle='#ffe066'; ctx.font='bold 18px "Courier New"'; ctx.textAlign='right';
  ctx.fillText(`SCORE: ${score}`, W-12, 28);
  ctx.fillStyle='#888'; ctx.font='13px "Courier New"';
  ctx.fillText(`BEST: ${hiScore}`, W-12, 46);

  ctx.fillStyle='#a8dadc'; ctx.font='bold 16px "Courier New"'; ctx.textAlign='center';
  ctx.fillText(`LEVEL ${level}`, W/2, 24);
  ctx.fillStyle='#666'; ctx.font='12px "Courier New"';
  ctx.fillText(`ENEMIES: ${enemies.length+spawnQueue.length}`, W/2, 42);

  // Cooldown bar
  const pct = Math.max(0, 1-player.cooldown/player.fireRate);
  ctx.fillStyle='#1a1a2e'; ctx.fillRect(W/2-52,H-18,104,9);
  ctx.fillStyle = pct>=1 ? '#ffe066' : '#886633';
  ctx.fillRect(W/2-52,H-18,pct*104,9);
  ctx.strokeStyle='#555'; ctx.lineWidth=1; ctx.strokeRect(W/2-52,H-18,104,9);

  ctx.fillStyle='rgba(255,255,255,0.22)'; ctx.font='11px "Courier New"'; ctx.textAlign='center';
  ctx.fillText('ARROWS/WASD move  ·  MOUSE aim  ·  CLICK/SPACE shoot  ·  P pause', W/2, H-30);
  ctx.textAlign='left';
}

// Decorative background enemies on menu
const decor = [
  {x:110,y:420,type:'basic',vx:0.5,vy:-0.25,angle:0.5,hp:1,maxHp:1,zigT:0},
  {x:680,y:140,type:'fast', vx:-0.3,vy:0.55,angle:1.2,hp:1,maxHp:1,zigT:0},
  {x:720,y:480,type:'tank', vx:-0.22,vy:-0.3,angle:2.1,hp:3,maxHp:3},
  {x:55, y:170,type:'basic',vx:0.45,vy:0.4,angle:0.8,hp:1,maxHp:1,zigT:0},
  {x:400,y:520,type:'fast', vx:0.3,vy:-0.4,angle:0.3,hp:1,maxHp:1,zigT:0},
];

function tickDecor() {
  for(const e of decor){
    e.x+=e.vx; e.y+=e.vy;
    if(e.x<25||e.x>W-25) e.vx*=-1;
    if(e.y<25||e.y>H-25) e.vy*=-1;
  }
}

function drawMenu() {
  drawBg();
  tickDecor();
  ctx.globalAlpha=0.2;
  for(const e of decor) drawEnemy(e);
  ctx.globalAlpha=1;

  const bob = Math.sin(animT*2)*5;
  ctx.textAlign='center';
  ctx.font='bold 70px "Courier New"';
  ctx.shadowBlur=24; ctx.shadowColor='#e94560';
  ctx.fillStyle='#e94560'; ctx.fillText('PIXEL', W/2, 185+bob);
  ctx.fillStyle='#ffe066'; ctx.shadowColor='#ffe066';
  ctx.fillText('ASSAULT', W/2, 268+bob);
  ctx.shadowBlur=0;

  if(Math.floor(animT*2)%2===0){
    ctx.fillStyle='#a8dadc'; ctx.font='bold 21px "Courier New"';
    ctx.fillText('CLICK  OR  PRESS  ENTER', W/2, 365);
  }
  ctx.fillStyle='#666'; ctx.font='15px "Courier New"';
  ctx.fillText(`BEST SCORE: ${hiScore}`, W/2, 415);
  ctx.fillStyle='#444'; ctx.font='12px "Courier New"';
  ctx.fillText('3 enemy types · infinite levels · top-down shooter', W/2, 475);
  ctx.textAlign='left';
}

function drawGameplay() {
  drawBg();
  drawParticles();
  drawBullets();
  for(const e of enemies) drawEnemy(e);
  drawPlayer();
  drawFlashes();
  drawHUD();
}

function drawLevelDone() {
  drawGameplay();
  ctx.fillStyle='rgba(0,0,0,0.52)'; ctx.fillRect(0,0,W,H);
  const pulse = 1+Math.sin(animT*5)*0.03;
  ctx.save(); ctx.translate(W/2,H/2); ctx.scale(pulse,pulse);
  ctx.textAlign='center';
  ctx.shadowBlur=20; ctx.shadowColor='#ffe066';
  ctx.fillStyle='#ffe066'; ctx.font='bold 52px "Courier New"'; ctx.fillText(`LEVEL ${level}`,0,-35);
  ctx.fillStyle='#a8dadc'; ctx.shadowColor='#a8dadc'; ctx.font='bold 30px "Courier New"'; ctx.fillText('COMPLETE!',0,20);
  ctx.shadowBlur=0;
  ctx.fillStyle='#888'; ctx.font='16px "Courier New"'; ctx.fillText(`SCORE: ${score}`,0,65);
  ctx.textAlign='left'; ctx.restore();
}

function drawGameOver() {
  drawBg();
  drawParticles();
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.shadowBlur=22; ctx.shadowColor='#e94560';
  ctx.fillStyle='#e94560'; ctx.font='bold 62px "Courier New"'; ctx.fillText('GAME OVER',W/2,215);
  ctx.shadowBlur=0;
  ctx.fillStyle='#ffe066'; ctx.font='bold 26px "Courier New"'; ctx.fillText(`SCORE: ${score}`,W/2,282);
  ctx.fillStyle='#aaa'; ctx.font='17px "Courier New"'; ctx.fillText(`BEST: ${hiScore}`,W/2,316);
  ctx.fillStyle='#666'; ctx.fillText(`REACHED LEVEL ${level}`,W/2,350);
  if(Math.floor(animT*2)%2===0){
    ctx.fillStyle='#a8dadc'; ctx.font='bold 19px "Courier New"';
    ctx.fillText('CLICK OR PRESS ENTER TO RETRY',W/2,415);
  }
  ctx.textAlign='left';
}

function drawPaused() {
  drawGameplay();
  ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#ffe066'; ctx.font='bold 52px "Courier New"'; ctx.fillText('PAUSED',W/2,H/2-20);
  ctx.fillStyle='#888'; ctx.font='18px "Courier New"'; ctx.fillText('Press P or Enter to resume',W/2,H/2+32);
  ctx.textAlign='left';
}

// ── Main Loop ─────────────────────────────────────────────────────────────────
function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  animT += dt;

  if (screen === SCREEN.MENU)       drawMenu();
  else if (screen === SCREEN.PLAY)  { update(dt); drawGameplay(); }
  else if (screen === SCREEN.LEVEL_DONE) { tickLevelDone(dt); drawLevelDone(); }
  else if (screen === SCREEN.GAME_OVER) {
    // keep particles ticking
    for(const p of particles){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=0.9;p.vy*=0.9;p.life-=dt;}
    particles = particles.filter(p=>p.life>0);
    drawGameOver();
  }
  else if (screen === SCREEN.PAUSED) drawPaused();
}

requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(loop); });
</script>
</body>
</html>
